# 2026sambong6(Vite) 빌드 후 GitHub Pages(https://dmlwjd85.github.io/2026sambong6/) 배포
# 저장소: GitHub → Settings → Pages → Build and deployment: GitHub Actions
name: Deploy 2026sambong6 to GitHub Pages

on:
    push:
        branches: [main, master]
        paths:
            - '2026sambong6/**'
            - '.github/workflows/deploy-2026sambong6-pages.yml'
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages-2026sambong6
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        env:
            FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: '24'
                  cache: npm
                  cache-dependency-path: 2026sambong6/package-lock.json

            - name: npm install 및 빌드
              working-directory: 2026sambong6
              run: |
                  if [ -f package-lock.json ]; then npm ci; else npm install; fi
                  npm run build

            - uses: actions/upload-pages-artifact@v3
              with:
                  path: 2026sambong6/dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - uses: actions/deploy-pages@v4
              id: deployment
